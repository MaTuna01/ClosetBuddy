<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>결제 테스트</title>
    <script src="https://js.tosspayments.com/v1/payment"></script>
</head>
<body>
<button onclick="requestPayment()">결제하기</button>

<script>
    // 1. 클라이언트 키 설정 (개발자센터에서 발급받은 Client Key)
    var clientKey = 'test_ck_Poxy1XQL8RP6Awdl0kwLV7nO5Wml';
    var tossPayments = TossPayments(clientKey);

    function requestPayment() {
        // 2. 결제 요청 (가상의 주문 데이터)
        tossPayments.requestPayment('카드', {
            amount: 10000, // 결제 금액
            orderId: 'TEST-ORDER-' + new Date().getTime(), // 주문 ID (유니크해야 함)
            orderName: '테스트 티셔츠',
            customerName: '테스트유저',
            // 중요: 결제 성공 시 리다이렉트 될 URL (백엔드로 바로 보내지 말고, 파라미터 확인용으로 설정)
            // 로컬호스트의 아무 주소나 적어도 되지만, 현재는 파라미터 탈취가 목적이므로 아래와 같이 설정
            successUrl: window.location.origin + '/success.html',
            failUrl: window.location.origin + '/fail.html',
        });
    }
</script>
</body>
</html>
