spring:
  config:
    activate:
      on-profile: test

  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
    defer-datasource-initialization: true

  sql:
    init:
      mode: always
      continue-on-error: true

  data:
    redis:
      host: localhost
      port: 6379

  # 카프카는 spring 하위에 위치!
  kafka:
    bootstrap-servers: localhost:9092

# 메인 yml과 동일하게 custom 하위에 배치 완료!
custom:
  jwt:
    validation:
      access: "dummy-access-key"
      refresh: "dummy-refresh-key"

    secrets:
      origin-key: "dummy-origin-key"
      app-key: "dummy-app-key"

    redirection:
      base: "https://dummy-redirection.com"

eureka:
  client:
    enabled: false