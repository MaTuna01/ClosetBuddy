name: Build and release docker image

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string
      service-dir:
        required: true
        type: string
      file-name:
        required: true
        type: string
    outputs:
      tag_name:
        value: ${{ jobs.tagging.outputs.tag_name }}

env:
  REGISTRY: docker.io

jobs:
  tagging:
    name: 태깅 및 릴리즈
    runs-on: ubuntu-latest
    outputs:
      tag_name: ${{ steps.tag_version.outputs.new_tag }}

    steps:
      - uses: actions/checkout@v4

      - name: versioning and tagging
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: '${{ inputs.service-name }}-v'

      - name: releasing
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}

  build-image:
    name: 도커 이미지 빌드
    runs-on: ubuntu-latest
    needs: tagging

    permissions:
      contents: read
      packages: write
      attestations: write
      id-token: write

    steps:
      - name: Check out Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: main-service yml pem 세팅
        if: ${{ inputs.service-name == 'main-service' }}
        run: |
          mkdir -p main-service/src/main/resources
          echo "${{ secrets.MAIN_SERVICE_YML}}" > main-service/src/main/resources/application.yml

      - name: user-service yml pem 세팅
        if: ${{ inputs.service-name == 'user-service' }}
        run: |
          mkdir -p user-service/src/main/resources
          echo "${{ secrets.USER_SERVICE_YML}}" > user-service/src/main/resources/application.yml

      - name: order-service yml pem 세팅
        if: ${{ inputs.service-name == 'order-service' }}
        run: |
          mkdir -p order-service/src/main/resources # main-service 오타 수정
          echo "${{ secrets.ORDER_SERVICE_YML}}" > order-service/src/main/resources/application.yml

      - name: pay-service yml pem 세팅
        if: ${{ inputs.service-name == 'pay-service' }}
        run: |
          mkdir -p pay-service/src/main/resources
          echo "${{ secrets.PAY_SERVICE_YML}}" > pay-service/src/main/resources/application.yml


      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew :${{ inputs.service-dir }}:clean :${{ inputs.service-dir }}:build -x test

      - name: Sign in github container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_AC_KEY }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ secrets.DOCKER_USERNAME }}/${{ inputs.service-name }}
          tags: |
            type=sha
            type=raw,value=${{ needs.tagging.outputs.tag_name }}
            type=raw,value=latest

      - name: Build and Push Image
        uses: docker/build-push-action@v6
        with:
          context: . # inputs.context가 선언되어 있지 않으므로 설정
          file: ${{ inputs.service-dir }}/${{ inputs.file-name }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}