name: user-service CD 스크립트

concurrency:
  group: user-service-deploy
  cancel-in-progress: false

on:
  push:
    branches:
      - main
    paths:
      - 'user-service/**'
  workflow_dispatch:
    inputs:
      service-name:
        description: 'Service name for deployment'
        required: false
        default: 'user-service'
      force-deploy:
        description: 'Force deployment even without changes'
        required: false
        type: boolean
        default: false

jobs:
  releasing:
    uses: ./.github/workflows/release.yml
    secrets: inherit
    with:
      context-path: .
      service-dir: user-service
      service-name: codebuddy-user-service
      file-name: Dockerfile

  deploying:
    needs: releasing
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    with:
      service-name: codebuddy-user-service
      image-tag: ${{ needs.releasing.outputs.tag_name }}