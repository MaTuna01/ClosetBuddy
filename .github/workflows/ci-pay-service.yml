name: pay-service CI 스크립트

on:
  pull_request:
    branches:
      - main
      - closetBuddy-MSA-dev
      - rksdu/231
    paths:
      - "pay-service/**"
      - "common-event/**"

  push:
    branches:
      - main
      - closetBuddy-MSA-dev
      - rksdu/231
    paths:
      - "pay-service/**"
      - "common-event/**"
jobs:
  execute-test:
    uses: ./.github/workflows/ci-workflow.yml
    secrets: inherit # 부모의 GITHUB_TOKEN을 자식에게 넘겨둠
    with:
      service-name: pay-service