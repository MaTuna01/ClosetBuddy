name: Publish recommend-event

on:
  push:
    branches: [ main, closetBuddy-MSA-dev ]
    paths:
      - 'recommend-event/**'          # recommend-event 디렉토리가 변경될 때 실행

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write #Github packages에 쓰기권한 부여

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # gradlew 실행권한 부여
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew
        working-directory: recommend-event

      # GitHub Packages에 배포
      - name: Publish to GitHub Packages
        run: ./gradlew publish
        working-directory: recommend-event
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}