name: CI 스크립트 실행

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -proot"
          --health-interval=10s
          --health-timeout=5s 
          --health-retries=3
      redis:
        image: redis:latest
        ports:
          - 6379:6379

      elasticsearch:
        image: ghcr.io/eddie1031/es:latest
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          xpack.security.http.ssl.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200

      kafka:
        image: confluentinc/confluent-local:7.5.0
        ports:
          - 9092:9092

      chromadb: # 추후 AI-Service를 위해 넣어두기
        image: chromadb/chroma:latest
        env:
          IS_PERSISTENT: "TRUE"
          ANONYMIZED_TELEMETRY: "TRUE"
        ports:
          - 8000:8000

    defaults:
      run: # 루트가 아니라 파라미터로 받은 서비스 폴더로 기본 작업 경로 변경
        working-directory: ${{ inputs.service-name }}

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4 # actions 버전 수정

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: gradlew 권한 설정
        run: chmod +x gradlew

        # 기존의 publishToMavenLocal 삭제

        # GITHUB_ACTOR / GITHUB_TOKEN 환경변수 매핑
      - name: Build ${{ inputs.service-name }}
        run: ./gradlew build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}