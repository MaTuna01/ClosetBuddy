name: CI 스크립트 실행

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: . # 루트에서 실행됩니다.

    steps:
      - uses: actions/checkout@v4 # actions 버전 수정

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: gradlew 권한 설정
        run: chmod +x gradlew

      - name: 공통 라이브러리 선행 빌드
        run: ./gradlew :common-event:publishToMavenLocal

      - name: Build ${{ inputs.service-name }} # 전달 받은 이름으로 빌드
        run: ./gradlew :${{ inputs.service-name }}:build