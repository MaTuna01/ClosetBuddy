name: CI 스크립트 실행

on:
  workflow_call:
    inputs:
      service-name:
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: . # 루트에서 실행됩니다.

    permissions:
      contents: read
      packages: read

    steps:
      - uses: actions/checkout@v4 # actions 버전 수정

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: gradlew 권한 설정
        run: chmod +x gradlew

        # 기존의 publishToMavenLocal 삭제

        # GITHUB_ACTOR / GITHUB_TOKEN 환경변수 매핑
      - name: Build ${{ inputs.service-name }}
        run: ./gradlew :${{ inputs.service-name }}:build
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}